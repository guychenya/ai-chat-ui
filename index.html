<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        .header-btn:hover { background: #f5f5f5; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }
        .llama-icon { font-size: 48px; margin-bottom: 20px; }
        .messages {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.user .message-content {
            background: #007AFF;
            color: white;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e5e5e5;
        }
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        .input-container {
            background: white;
            border-top: 1px solid #e5e5e5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 8px 12px;
        }
        .input-field {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 15px;
            padding: 8px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }
        .model-select {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
        }
        .send-btn {
            background: #333;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #000; }
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .add-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
        }
        .add-btn:hover { background: #e5e5e5; border-radius: 4px; }
        .file-input { display: none; }
        .file-badge {
            background: #007AFF;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .file-badge button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-btn" onclick="newChat()">
            <span>✏️</span>
            <span>New Chat</span>
        </button>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="llama-icon">🦙</div>
        </div>
        <div class="messages" id="messages" style="display: none;"></div>
    </div>
    <div class="input-container">
        <div class="input-wrapper">
            <textarea class="input-field" id="messageInput" placeholder="Send a message" rows="1" onkeydown="handleKeyPress(event)"></textarea>
            <input type="file" id="fileInput" class="file-input" accept=".txt,.md,.json,.csv,.log" onchange="handleFileSelect(event)">
            <button class="add-btn" onclick="document.getElementById('fileInput').click()">+</button>
            <div id="fileBadge" style="display: none;"></div>
            <select class="model-select" id="modelSelect">
                <option value="phi3:mini">phi3:mini</option>
            </select>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <span>↑</span>
            </button>
        </div>
    </div>
    <script>
        const API_URL = 'http://157.173.126.133:8888';
        const API_KEY = 'sk-ai-7f9d2e8c4b6a1f3e5d8c9b2a4f7e1d6c3b8a5f2e9d7c4b1a6f3e8d5c2b9a7f4e1g';
        let attachedFileContent = null;
        let attachedFileName = null;

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function newChat() {
            document.getElementById('messages').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            clearAttachment();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedFileContent = e.target.result;
                attachedFileName = file.name;
                showFileBadge(file.name);
            };
            reader.readAsText(file);
        }

        function showFileBadge(fileName) {
            const badge = document.getElementById('fileBadge');
            badge.innerHTML = `<span class="file-badge">${fileName} <button onclick="clearAttachment()">×</button></span>`;
            badge.style.display = 'block';
        }

        function clearAttachment() {
            attachedFileContent = null;
            attachedFileName = null;
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            let message = input.value.trim();
            
            if (!message && !attachedFileContent) return;

            if (attachedFileContent) {
                message = `${message}\n\n[File: ${attachedFileName}]\n${attachedFileContent}`;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            clearAttachment();

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            const typingId = addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        message: message,
                        model: document.getElementById('modelSelect').value
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let responseMessageId = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());
                    
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.response) {
                                fullResponse += data.response;
                                
                                if (!responseMessageId) {
                                    removeTypingIndicator(typingId);
                                    responseMessageId = addMessage('assistant', fullResponse);
                                } else {
                                    updateMessage(responseMessageId, fullResponse);
                                }
                            }
                        } catch (e) {
                            // Skip invalid JSON
                        }
                    }
                }

                if (!responseMessageId) {
                    removeTypingIndicator(typingId);
                    addMessage('assistant', 'No response received');
                }
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Error: ' + error.message);
            }
            sendBtn.disabled = false;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'typing-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function removeTypingIndicator(typingId) {
            const element = document.getElementById(typingId);
            if (element) {
                element.remove();
            }
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'msg-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function updateMessage(messageId, content) {
            const element = document.getElementById(messageId);
            if (element) {
                const contentDiv = element.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = content;
                    scrollToBottom();
                }
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
