<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: rgba(32, 33, 35, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 20px rgba(0,0,0,0.2);
        }
        .sidebar.hidden { 
            margin-left: -280px;
            box-shadow: none;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .new-chat-btn {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .new-chat-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .new-chat-btn:active { transform: translateY(0); }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-track { background: transparent; }
        .chat-list::-webkit-scrollbar-thumb { 
            background: rgba(255,255,255,0.2); 
            border-radius: 3px;
        }
        .chat-item {
            padding: 12px 14px;
            margin: 6px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #ececf1;
            transition: all 0.2s ease;
        }
        .chat-item:hover { 
            background: rgba(255,255,255,0.1);
            transform: translateX(4px);
        }
        .chat-item.active { 
            background: rgba(102, 126, 234, 0.3);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .chat-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 6px;
            font-size: 16px;
            opacity: 0;
            transition: all 0.2s ease;
            border-radius: 6px;
        }
        .chat-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { 
            color: #ff4444;
            background: rgba(255,68,68,0.1);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 20px 0 0 20px;
            overflow: hidden;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .header {
            background: white;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-btn {
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            color: #666;
            transition: all 0.2s ease;
        }
        .header-btn:hover { 
            background: #e8e8e8;
            transform: scale(1.05);
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background: linear-gradient(to bottom, #fafafa 0%, #ffffff 100%);
        }
        .chat-container::-webkit-scrollbar { width: 8px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { 
            background: #ddd; 
            border-radius: 4px;
        }
        .chat-container.drag-over::after {
            content: '📎 Drop file here';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(102, 126, 234, 0.1);
            border: 3px dashed #667eea;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }
        .llama-icon { 
            font-size: 64px; 
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .messages {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        .message-content:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-1px);
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #f0f0f0;
        }
        .typing-indicator {
            display: inline-flex;
            gap: 6px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: typing 1.4s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 0.6; 
            }
            30% { 
                transform: translateY(-12px) scale(1.2); 
                opacity: 1; 
            }
        }
        .input-container {
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f8f8f8;
            border-radius: 24px;
            padding: 12px 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within {
            background: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            border: 2px solid #667eea;
            padding: 10px 14px;
        }
        .input-field {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 15px;
            padding: 8px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            color: #333;
        }
        .model-select {
            border: none;
            background: rgba(102, 126, 234, 0.1);
            outline: none;
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .model-select:hover {
            background: rgba(102, 126, 234, 0.2);
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .send-btn:hover { 
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .add-btn {
            background: rgba(102, 126, 234, 0.1);
            border: none;
            font-size: 20px;
            color: #667eea;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .add-btn:hover { 
            background: rgba(102, 126, 234, 0.2);
            transform: rotate(90deg);
        }
        .file-input { display: none; }
        .file-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            animation: slideIn 0.3s ease;
        }
        .file-badge button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 14px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .file-badge button:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }
        .footer {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <span>✨</span>
                <span>New Chat</span>
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main-content">
        <div class="header">
            <button class="header-btn" onclick="toggleSidebar()">
                <span>☰</span>
            </button>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="llama-icon">🦙</div>
            </div>
            <div class="messages" id="messages" style="display: none;"></div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="input-field" id="messageInput" placeholder="Send a message..." rows="1" onkeydown="handleKeyPress(event)"></textarea>
                <input type="file" id="fileInput" class="file-input" accept=".txt,.md,.json,.csv,.log" onchange="handleFileSelect(event)">
                <button class="add-btn" onclick="document.getElementById('fileInput').click()">+</button>
                <div id="fileBadge" style="display: none;"></div>
                <select class="model-select" id="modelSelect">
                    <option value="phi3:mini">phi3:mini</option>
                </select>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <span>↑</span>
                </button>
            </div>
            <div class="footer">Made with ❤️ by Guy Chenya - For Training Purposes Only</div>
        </div>
    </div>
    <script>
        const API_URL = 'http://157.173.126.133:8888';
        const API_KEY = 'sk-ai-7f9d2e8c4b6a1f3e5d8c9b2a4f7e1d6c3b8a5f2e9d7c4b1a6f3e8d5c2b9a7f4e1g';
        let attachedFileContent = null;
        let attachedFileName = null;
        let currentChatId = null;
        let isGenerating = false;
        let chats = JSON.parse(localStorage.getItem('chats') || '[]');

        const chatContainer = document.getElementById('chatContainer');
        chatContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            chatContainer.classList.add('drag-over');
        });
        chatContainer.addEventListener('dragleave', () => {
            chatContainer.classList.remove('drag-over');
        });
        chatContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            chatContainer.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    attachedFileContent = ev.target.result;
                    attachedFileName = file.name;
                    showFileBadge(file.name);
                };
                reader.readAsText(file);
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function newChat() {
            currentChatId = Date.now().toString();
            document.getElementById('messages').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            clearAttachment();
            updateChatList();
        }

        function loadChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            currentChatId = chatId;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            
            chat.messages.forEach(msg => {
                addMessage(msg.role, msg.content, false);
            });
            updateChatList();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            if (isGenerating && chatId === currentChatId) {
                alert("Cannot delete chat while response is being generated");
                return;
            }
            if (!confirm('Delete this chat?')) return;
            chats = chats.filter(c => c.id !== chatId);
            localStorage.setItem('chats', JSON.stringify(chats));
            if (currentChatId === chatId) {
                newChat();
            }
            updateChatList();
        }

        function saveCurrentChat() {
            if (!currentChatId) return;
            
            const messages = Array.from(document.querySelectorAll('.message:not(.typing-indicator-msg)')).map(el => {
                const content = el.querySelector('.message-content');
                if (!content || content.querySelector('.typing-indicator')) return null;
                return {
                    role: el.classList.contains('user') ? 'user' : 'assistant',
                    content: content.textContent
                };
            }).filter(m => m !== null);
            
            if (messages.length === 0) return;
            
            const existingChat = chats.find(c => c.id === currentChatId);
            const title = messages[0].content.substring(0, 30) + (messages[0].content.length > 30 ? '...' : '');
            
            if (existingChat) {
                existingChat.messages = messages;
                existingChat.title = title;
                existingChat.updated = Date.now();
            } else {
                chats.unshift({
                    id: currentChatId,
                    title: title,
                    messages: messages,
                    created: Date.now(),
                    updated: Date.now()
                });
            }
            
            localStorage.setItem('chats', JSON.stringify(chats));
            updateChatList();
        }

        function updateChatList() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <span class="chat-item-title">${chat.title}</span>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">🗑️</button>
                </div>
            `).join('');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedFileContent = e.target.result;
                attachedFileName = file.name;
                showFileBadge(file.name);
            };
            reader.readAsText(file);
        }

        function showFileBadge(fileName) {
            const badge = document.getElementById('fileBadge');
            badge.innerHTML = `<span class="file-badge">${fileName} <button onclick="clearAttachment()">×</button></span>`;
            badge.style.display = 'block';
        }

        function clearAttachment() {
            attachedFileContent = null;
            attachedFileName = null;
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            let message = input.value.trim();
            let displayMessage = message;
            
            if (!message && !attachedFileContent) return;
            if (!currentChatId) currentChatId = Date.now().toString();

            if (attachedFileContent) {
                message = `${message}\n\n[File: ${attachedFileName}]\n${attachedFileContent}`;
                displayMessage = `${displayMessage}\n\n📎 ${attachedFileName}`;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';

            addMessage('user', displayMessage);
            input.value = '';
            input.style.height = 'auto';
            clearAttachment();

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            isGenerating = true;
            
            const typingId = addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        message: message,
                        model: document.getElementById('modelSelect').value
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let responseMessageId = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());
                    
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.response) {
                                fullResponse += data.response;
                                
                                if (!responseMessageId) {
                                    removeTypingIndicator(typingId);
                                    responseMessageId = addMessage('assistant', fullResponse);
                                } else {
                                    updateMessage(responseMessageId, fullResponse);
                                }
                            }
                        } catch (e) {}
                    }
                }

                if (!responseMessageId) {
                    removeTypingIndicator(typingId);
                    addMessage('assistant', 'No response received');
                }
                
                saveCurrentChat();
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Error: ' + error.message);
            }
            isGenerating = false;
            sendBtn.disabled = false;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'typing-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant typing-indicator-msg';
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function removeTypingIndicator(typingId) {
            document.querySelectorAll(".typing-indicator-msg").forEach(el => el.remove());
        }

        function addMessage(role, content, save = true) {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'msg-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function updateMessage(messageId, content) {
            const element = document.getElementById(messageId);
            if (element) {
                const contentDiv = element.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = content;
                    scrollToBottom();
                }
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        updateChatList();
        if (chats.length === 0) {
            newChat();
        }
    </script>
</body>
</html>
