<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s;
        }
        .sidebar.hidden {
            margin-left: -260px;
        }
        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #444;
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #343541;
            border: 1px solid #565869;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .new-chat-btn:hover { background: #40414f; }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #ececf1;
        }
        .chat-item:hover { background: #343541; }
        .chat-item.active { background: #343541; }
        .chat-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .chat-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ff4444; }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        .header-btn:hover { background: #f5f5f5; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }
        .llama-icon { font-size: 48px; margin-bottom: 20px; }
        .messages {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.user .message-content {
            background: #007AFF;
            color: white;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e5e5e5;
        }
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        .input-container {
            background: white;
            border-top: 1px solid #e5e5e5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 8px 12px;
        }
        .input-field {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 15px;
            padding: 8px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
        }
        .model-select {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
        }
        .send-btn {
            background: #333;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: #000; }
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .add-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
        }
        .add-btn:hover { background: #e5e5e5; border-radius: 4px; }
        .file-input { display: none; }
        .file-badge {
            background: #007AFF;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .file-badge button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <span>✏️</span>
                <span>New Chat</span>
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main-content">
        <div class="header">
            <button class="header-btn" onclick="toggleSidebar()">
                <span>☰</span>
            </button>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="llama-icon">🦙</div>
            </div>
            <div class="messages" id="messages" style="display: none;"></div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="input-field" id="messageInput" placeholder="Send a message" rows="1" onkeydown="handleKeyPress(event)"></textarea>
                <input type="file" id="fileInput" class="file-input" accept=".txt,.md,.json,.csv,.log" onchange="handleFileSelect(event)">
                <button class="add-btn" onclick="document.getElementById('fileInput').click()">+</button>
                <div id="fileBadge" style="display: none;"></div>
                <select class="model-select" id="modelSelect">
                    <option value="phi3:mini">phi3:mini</option>
                </select>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <span>↑</span>
                </button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'http://157.173.126.133:8888';
        const API_KEY = 'sk-ai-7f9d2e8c4b6a1f3e5d8c9b2a4f7e1d6c3b8a5f2e9d7c4b1a6f3e8d5c2b9a7f4e1g';
        let attachedFileContent = null;
        let attachedFileName = null;
        let currentChatId = null;
        let chats = JSON.parse(localStorage.getItem('chats') || '[]');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function newChat() {
            currentChatId = Date.now().toString();
            document.getElementById('messages').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            clearAttachment();
            updateChatList();
        }

        function loadChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            currentChatId = chatId;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            
            chat.messages.forEach(msg => {
                addMessage(msg.role, msg.content, false);
            });
            updateChatList();
        }

        function deleteChat(chatId, event) {
            event.stopPropagation();
            chats = chats.filter(c => c.id !== chatId);
            localStorage.setItem('chats', JSON.stringify(chats));
            if (currentChatId === chatId) {
                newChat();
            }
            updateChatList();
        }

        function saveCurrentChat() {
            if (!currentChatId) return;
            
            const messages = Array.from(document.querySelectorAll('.message:not(.typing-indicator)')).map(el => {
                const content = el.querySelector('.message-content');
                if (!content || content.querySelector('.typing-indicator')) return null;
                return {
                    role: el.classList.contains('user') ? 'user' : 'assistant',
                    content: content.textContent
                };
            }).filter(m => m !== null);
            
            if (messages.length === 0) return;
            
            const existingChat = chats.find(c => c.id === currentChatId);
            const title = messages[0].content.substring(0, 30) + (messages[0].content.length > 30 ? '...' : '');
            
            if (existingChat) {
                existingChat.messages = messages;
                existingChat.title = title;
                existingChat.updated = Date.now();
            } else {
                chats.unshift({
                    id: currentChatId,
                    title: title,
                    messages: messages,
                    created: Date.now(),
                    updated: Date.now()
                });
            }
            
            localStorage.setItem('chats', JSON.stringify(chats));
            updateChatList();
        }

        function updateChatList() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat('${chat.id}')">
                    <span class="chat-item-title">${chat.title}</span>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">🗑️</button>
                </div>
            `).join('');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                attachedFileContent = e.target.result;
                attachedFileName = file.name;
                showFileBadge(file.name);
            };
            reader.readAsText(file);
        }

        function showFileBadge(fileName) {
            const badge = document.getElementById('fileBadge');
            badge.innerHTML = `<span class="file-badge">${fileName} <button onclick="clearAttachment()">×</button></span>`;
            badge.style.display = 'block';
        }

        function clearAttachment() {
            attachedFileContent = null;
            attachedFileName = null;
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            let message = input.value.trim();
            
            if (!message && !attachedFileContent) return;
            if (!currentChatId) currentChatId = Date.now().toString();

            if (attachedFileContent) {
                message = `${message}\n\n[File: ${attachedFileName}]\n${attachedFileContent}`;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            clearAttachment();

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            const typingId = addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({
                        message: message,
                        model: document.getElementById('modelSelect').value
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                let responseMessageId = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());
                    
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            if (data.response) {
                                fullResponse += data.response;
                                
                                if (!responseMessageId) {
                                    removeTypingIndicator(typingId);
                                    responseMessageId = addMessage('assistant', fullResponse);
                                } else {
                                    updateMessage(responseMessageId, fullResponse);
                                }
                            }
                        } catch (e) {
                            // Skip invalid JSON
                        }
                    }
                }

                if (!responseMessageId) {
                    removeTypingIndicator(typingId);
                    addMessage('assistant', 'No response received');
                }
                
                saveCurrentChat();
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Error: ' + error.message);
            }
            sendBtn.disabled = false;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'typing-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant typing-indicator-msg';
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function removeTypingIndicator(typingId) {
            document.querySelectorAll(".typing-indicator-msg").forEach(el => el.remove());
        }

        function addMessage(role, content, save = true) {
            const messagesDiv = document.getElementById('messages');
            const messageId = 'msg-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.id = messageId;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageId;
        }

        function updateMessage(messageId, content) {
            const element = document.getElementById(messageId);
            if (element) {
                const contentDiv = element.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = content;
                    scrollToBottom();
                }
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Initialize
        updateChatList();
        if (chats.length === 0) {
            newChat();
        }
    </script>
</body>
</html>
